name: Feature request
description: Suggest an improvement for Echo Isle.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Tell us about the listening workflow, not just the button you want. That helps us design the right thing.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would make this better?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Discovery and search
        - RSS import
        - Subscriptions
        - Playback
        - Downloads
        - Library
        - Privacy
        - Localization
        - Other
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have checked existing issues for similar requests.
          required: true
