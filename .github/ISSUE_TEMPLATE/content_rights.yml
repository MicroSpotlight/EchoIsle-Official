name: Content or rights request
description: For podcast publishers requesting attribution, correction, removal, or rights review.
title: "[Content Rights]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this form if you are a podcast publisher or authorized representative. Do not include private legal documents in public issues.
  - type: input
    id: show-title
    attributes:
      label: Show title
    validations:
      required: true
  - type: input
    id: feed-url
    attributes:
      label: RSS feed URL
    validations:
      required: true
  - type: input
    id: episode-url
    attributes:
      label: Episode URL
      placeholder: "Optional"
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What action are you requesting?
    validations:
      required: true
  - type: textarea
    id: authority
    attributes:
      label: Publisher authority
      description: Explain how we can verify that you are the publisher or authorized representative.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I am the publisher or an authorized representative of this content.
          required: true
